name: Mockup Video

# Triggered by Make via the GitHub API (workflow_dispatch).
on:
  workflow_dispatch:
    inputs:
      city:
        description: "City name, e.g. Antwerp"
        required: true
        type: string
      file_ids:
        description: "Comma-separated Drive file IDs of the 7 mockups (mockup_ids)"
        required: true
        type: string
      callback_url:
        description: "Make webhook URL to notify when done (optional)"
        required: false
        type: string
      record_key:
        description: "Ledger record key (passed back unchanged in the callback)"
        required: false
        type: string
      folder_id:
        description: "Drive folder id for the city (passed back unchanged in the callback)"
        required: false
        type: string

permissions:
  contents: write   # lets the built-in GITHUB_TOKEN create the release

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure ffmpeg
        run: ffmpeg -version >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y ffmpeg)

      - name: Download the 7 mockups
        run: |
          set -euo pipefail
          mkdir -p src out
          IFS=',' read -ra IDS <<< "${{ inputs.file_ids }}"
          if [ "${#IDS[@]}" -lt 2 ]; then
            echo "Expected at least 2 file ids, got ${#IDS[@]}"; exit 1
          fi
          echo "Got ${#IDS[@]} file ids"
          n=0
          for id in "${IDS[@]}"; do
            n=$((n+1))
            clean=$(echo "$id" | tr -d '[:space:]')
            url="https://lh3.googleusercontent.com/d/${clean}=w1600"
            echo "downloading $n: $url"
            curl -fSL --retry 3 -o "src/$n.png" "$url"
          done
          ls -la src

      - name: Render MP4
        run: |
          set -euo pipefail
          python3 scripts/make_video.py --src ./src --out ./out/video.mp4
          ls -la out

      - name: Publish as release asset
        id: publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          city_slug=$(echo "${{ inputs.city }}" | tr ' ' '-' | tr -cd '[:alnum:]-')
          fname="Travel-${city_slug}-video.mp4"
          tag="video-${city_slug}-${{ github.run_id }}-${{ github.run_attempt }}"
          mv out/video.mp4 "out/${fname}"
          gh release create "$tag" "out/${fname}" \
            --title "$tag" --notes "Mockup video for ${{ inputs.city }}"
          owner_repo="${{ github.repository }}"
          url="https://github.com/${owner_repo}/releases/download/${tag}/${fname}"
          echo "video_url=$url"      >> "$GITHUB_OUTPUT"
          echo "tag=$tag"            >> "$GITHUB_OUTPUT"
          echo "filename=$fname"     >> "$GITHUB_OUTPUT"
          {
            echo "### Mockup video ready"
            echo "- city: ${{ inputs.city }}"
            echo "- url: $url"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Make
        if: ${{ inputs.callback_url != '' }}
        run: |
          set -euo pipefail
          curl -fSL -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
                  --arg city '${{ inputs.city }}' \
                  --arg url  '${{ steps.publish.outputs.video_url }}' \
                  --arg tag  '${{ steps.publish.outputs.tag }}' \
                  --arg file '${{ steps.publish.outputs.filename }}' \
                  --arg key  '${{ inputs.record_key }}' \
                  --arg fid  '${{ inputs.folder_id }}' \
                  '{status:"done", city:$city, video_url:$url, tag:$tag, filename:$file, record_key:$key, folder_id:$fid}')"
